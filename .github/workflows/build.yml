name: Збірка та реліз мода

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Версія збірки"
        required: true
        default: "1.7.1"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Завантажити репозиторій
        uses: actions/checkout@v4

      - name: Визначити версію
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi

          VERSION="${VERSION#v}"
          MOD_NAME="armor-calculator-${VERSION}"

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "MOD_NAME=${MOD_NAME}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v${VERSION}" >> "$GITHUB_ENV"

      - name: Підготувати структуру мода
        shell: bash
        run: |
          set -euo pipefail

          rm -rf build dist
          mkdir -p build/res/scripts/client/gui/mods
          mkdir -p dist

          cp src/*.py build/res/scripts/client/gui/mods/

          if [ -d configs ]; then
            mkdir -p build/mods/configs
            cp -R configs/. build/mods/configs/
          fi

          if [ -d res ]; then
            cp -R res/. build/res/
          fi

          cat > build/meta.xml <<EOF
          <root>
            <id>armor.calculator</id>
            <version>${VERSION}</version>
            <name>Armor Penetration Calculator</name>
            <description>Калькулятор ефективної броні та ймовірності пробиття для World of Tanks.</description>
          </root>
          EOF

          (
            cd build
            zip -9 -r "../dist/${MOD_NAME}.wotmod" .
          )

          (
            cd dist
            zip -9 "${MOD_NAME}.zip" "${MOD_NAME}.wotmod"
          )

      - name: Перевірити вміст збірки
        shell: bash
        run: |
          set -euo pipefail
          unzip -t "dist/${MOD_NAME}.wotmod"
          unzip -l "dist/${MOD_NAME}.wotmod"
          ls -lah dist

      - name: Завантажити артефакт Actions
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MOD_NAME }}
          path: |
            dist/*.wotmod
            dist/*.zip
          if-no-files-found: error
          retention-days: 30

      - name: Створити або оновити GitHub Release
        uses: ncipollo/release-action@v1.14.0
        with:
          tag: ${{ env.RELEASE_TAG }}
          commit: ${{ github.sha }}
          name: Armor Calculator ${{ env.VERSION }}
          body: |
            Збірка Armor Penetration Calculator для World of Tanks.

            Виправлено сумісність із новою структурою даних снарядів та відсутнім параметром `jetLossPPByDist`.
          artifacts: "dist/*.wotmod,dist/*.zip"
          artifactErrorsFailBuild: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
